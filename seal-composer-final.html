<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>書法全景定位工具-最終完整版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <style>
        :root { --primary: #007AFF; --accent: #FF3B30; }
        body { font-family: -apple-system, sans-serif; background: #2c2c2e; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; color: white; }
        .header { background: #1c1c1e; padding: 15px; z-index: 10; border-bottom: 1px solid #3a3a3c; }
        .upload-btns { display: flex; gap: 10px; }
        label { flex: 1; background: var(--primary); padding: 12px; border-radius: 8px; cursor: pointer; text-align: center; font-weight: bold; font-size: 14px; }
        label.green { background: #34C759; }
        input[type="file"] { display: none; }
        #viewport { flex: 1; display: flex; justify-content: center; align-items: center; overflow: auto; padding: 20px; background: radial-gradient(#3a3a3c, #1c1c1e); }
        .footer { background: #1c1c1e; padding: 15px 20px 30px 20px; border-top: 1px solid #3a3a3c; }
        .tool-row { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .tool-row span { font-size: 13px; color: #aeaeb2; min-width: 60px; }
        input[type="range"] { flex: 1; }
        #download-btn { background: var(--accent); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .mode-switch { margin-bottom: 10px; display: flex; background: #3a3a3c; border-radius: 8px; padding: 2px; }
        .mode-btn { flex: 1; padding: 8px; border: none; background: none; color: #aeaeb2; cursor: pointer; font-size: 12px; border-radius: 6px; }
        .mode-btn.active { background: #636366; color: white; }
    </style>
</head>
<body>

<div class="header">
    <div class="upload-btns">
        <label for="bg-input">🖼️ 載入作品</label>
        <input type="file" id="bg-input" accept="image/*">
        <label for="fg-input" class="green">🧧 載入印章</label>
        <input type="file" id="fg-input" accept="image/*">
    </div>
</div>

<div id="viewport">
    <canvas id="main-canvas"></canvas>
</div>

<div class="footer">
    <div class="mode-switch">
        <button class="mode-btn active" id="btn-fit" onclick="setZoomMode('fit')">🔭 全景模式</button>
        <button class="mode-btn" id="btn-orig" onclick="setZoomMode('original')">🔍 1:1 模式</button>
    </div>
    <div class="tool-row">
        <span>印章顏色</span>
        <input type="color" id="color-picker" value="#C41E3A">
        <span>透明度</span>
        <input type="range" id="opacity-slider" min="0.1" max="1" step="0.1" value="1">
    </div>
    <button id="download-btn">完成並導出作品</button>
</div>

<script>
    const canvas = new fabric.Canvas('main-canvas');
    let originalImg = null;
    let currentMode = 'fit';

    document.getElementById('bg-input').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(f) {
            fabric.Image.fromURL(f.target.result, function(img) {
                originalImg = img;
                renderCanvas();
            });
        };
        reader.readAsDataURL(file);
        this.value = '';
    };

    function renderCanvas() {
        if (!originalImg) return;
        const vW = window.innerWidth - 40;
        const vH = document.getElementById('viewport').clientHeight - 40;
        const imgW = originalImg.width;
        const imgH = originalImg.height;
        let scale = (currentMode === 'fit') ? Math.min(vW / imgW, vH / imgH) : vW / imgW;
        canvas.setDimensions({ width: imgW * scale, height: imgH * scale });
        canvas.setBackgroundImage(originalImg, canvas.renderAll.bind(canvas), { scaleX: scale, scaleY: scale });
    }

    function setZoomMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(mode === 'fit' ? 'btn-fit' : 'btn-orig').classList.add('active');
        renderCanvas();
    }

    document.getElementById('fg-input').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(f) {
            const imgElement = new Image();
            imgElement.src = f.target.result;
            imgElement.onload = function() {
                const tempCanvas = document.createElement('canvas');
                const tCtx = tempCanvas.getContext('2d');
                tempCanvas.width = imgElement.width;
                tempCanvas.height = imgElement.height;
                tCtx.drawImage(imgElement, 0, 0);

                const imgData = tCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
                for (let i = 0; i < imgData.data.length; i += 4) {
                    if (imgData.data[i] > 190 && imgData.data[i+1] > 190 && imgData.data[i+2] > 190) imgData.data[i+3] = 0;
                }
                tCtx.putImageData(imgData, 0, 0);

                fabric.Image.fromURL(tempCanvas.toDataURL(), function(stamp) {
                    stamp.scaleToWidth(canvas.width * 0.1);
                    stamp.set({
                        left: canvas.width / 2, top: canvas.height / 2,
                        cornerSize: 8, transparentCorners: false, cornerColor: '#007AFF',
                        lockScalingFlip: true, lockUniScaling: true, hasRotatingPoint: true, rotatingPointOffset: 20
                    });
                    stamp.setControlsVisibility({ mt: false, mb: false, ml: false, mr: false });
                    canvas.add(stamp);
                    canvas.setActiveObject(stamp);
                    applyColor(stamp);
                });
            };
        };
        reader.readAsDataURL(file);
        this.value = '';
    };

    function applyColor(obj) {
        if (!obj || !obj.isType('image')) return;
        obj.filters = [new fabric.Image.filters.BlendColor({
            color: document.getElementById('color-picker').value,
            mode: 'tint', alpha: 1
        })];
        obj.applyFilters();
        canvas.renderAll();
    }

    document.getElementById('color-picker').oninput = () => applyColor(canvas.getActiveObject());
    document.getElementById('opacity-slider').oninput = function() {
        const obj = canvas.getActiveObject();
        if(obj) { obj.set('opacity', parseFloat(this.value)); canvas.renderAll(); }
    };

    document.getElementById('download-btn').onclick = function() {
        if (!originalImg) return;

        // 用原生 canvas 合成，避免 iframe 跨域限制
        const multiplier = originalImg.width / canvas.width;
        const outW = Math.round(canvas.width * multiplier);
        const outH = Math.round(canvas.height * multiplier);

        const outCanvas = document.createElement('canvas');
        outCanvas.width = outW;
        outCanvas.height = outH;
        const ctx = outCanvas.getContext('2d');

        // 畫底圖
        ctx.drawImage(originalImg.getElement(), 0, 0, outW, outH);

        // 畫每個印章物件
        canvas.getObjects().forEach(function(obj) {
            if (!obj.isType('image')) return;
            const el = obj.getElement();
            const scaleX = obj.scaleX * multiplier;
            const scaleY = obj.scaleY * multiplier;
            const left = obj.left * multiplier;
            const top = obj.top * multiplier;
            const w = el.naturalWidth || el.width;
            const h = el.naturalHeight || el.height;
            ctx.globalAlpha = obj.opacity;
            ctx.drawImage(el, left, top, w * scaleX, h * scaleY);
        });
        ctx.globalAlpha = 1;

        const dataURL = outCanvas.toDataURL('image/png');

        if (/iPhone|iPad/i.test(navigator.userAgent)) {
            const win = window.open();
            win.document.write('<img src="' + dataURL + '" style="max-width:100%">');
            win.document.title = '長按圖片儲存到相簿';
        } else {
            const link = document.createElement('a');
            link.download = '書法成品_' + new Date().getTime() + '.png';
            link.href = dataURL;
            link.click();
        }
    };

    window.onresize = renderCanvas;
</script>
</body>
</html>
